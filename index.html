<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <style>
        /* CSS: Making it look good */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-container {
            background-color: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        input[type="number"] {
            padding: 10px;
            font-size: 16px;
            width: 70%;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #restartBtn {
            background-color: #28a745;
            display: none; /* Hidden by default */
            margin-top: 15px;
        }

        .message {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            min-height: 1.5rem;
        }

        .history {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Guess The Number</h1>
        <p>I'm thinking of a number between <strong>1 and 100</strong>.</p>
        
        <input type="number" id="guessInput" placeholder="Enter your guess" min="1" max="100">
        <br>
        <button onclick="checkGuess()" id="submitBtn">Submit Guess</button>
        <button onclick="restartGame()" id="restartBtn">Play Again</button>

        <div class="message" id="message"></div>
        <div class="history" id="history">Previous guesses: </div>
    </div>

    <script>
        // JAVASCRIPT: The Brains of the game

        // 1. Generate a random number between 1 and 100
        let randomNumber = Math.floor(Math.random() * 100) + 1;
        let attempts = 0;
        let previousGuesses = [];

        // Get HTML elements
        const inputField = document.getElementById('guessInput');
        const messageDisplay = document.getElementById('message');
        const historyDisplay = document.getElementById('history');
        const submitBtn = document.getElementById('submitBtn');
        const restartBtn = document.getElementById('restartBtn');

        // Allow pressing "Enter" key to submit
        inputField.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkGuess();
            }
        });

        function checkGuess() {
            // Get user value and convert to number
            const userGuess = Number(inputField.value);

            // Validation: Check if input is empty or out of range
            if (!userGuess || userGuess < 1 || userGuess > 100) {
                messageDisplay.textContent = "Please enter a valid number between 1 and 100.";
                messageDisplay.style.color = "red";
                return;
            }

            attempts++;
            previousGuesses.push(userGuess);
            historyDisplay.textContent = "Previous guesses: " + previousGuesses.join(', ');

            if (userGuess === randomNumber) {
                // WIN CONDITION
                messageDisplay.textContent = `🎉 Correct! The number was ${randomNumber}. It took you ${attempts} attempts.`;
                messageDisplay.style.color = "green";
                endGame();
            } else if (userGuess > randomNumber) {
                // TOO HIGH
                messageDisplay.textContent = "Too High! Try again.";
                messageDisplay.style.color = "orange";
            } else {
                // TOO LOW
                messageDisplay.textContent = "Too Low! Try again.";
                messageDisplay.style.color = "blue";
            }

            // Clear input field and focus logic
            inputField.value = '';
            inputField.focus();
        }

        function endGame() {
            inputField.disabled = true;
            submitBtn.style.display = 'none';
            restartBtn.style.display = 'inline-block';
        }

        function restartGame() {
            // Reset variables
            randomNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            previousGuesses = [];

            // Reset UI
            messageDisplay.textContent = "";
            historyDisplay.textContent = "Previous guesses: ";
            inputField.disabled = false;
            inputField.value = '';
            
            submitBtn.style.display = 'inline-block';
            restartBtn.style.display = 'none';
            
            inputField.focus();
        }
    </script>
</body>
</html>
